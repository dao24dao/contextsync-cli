name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          COMMIT=${{ github.sha }}
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$DATE"

          # Darwin (macOS)
          GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o contextsync-darwin-amd64 ./cmd/contextsync
          GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o contextsync-darwin-arm64 ./cmd/contextsync

          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o contextsync-linux-amd64 ./cmd/contextsync
          GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o contextsync-linux-arm64 ./cmd/contextsync

          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o contextsync-windows-amd64.exe ./cmd/contextsync

      - name: Create archives
        run: |
          tar -czvf contextsync-darwin-amd64.tar.gz contextsync-darwin-amd64
          tar -czvf contextsync-darwin-arm64.tar.gz contextsync-darwin-arm64
          tar -czvf contextsync-linux-amd64.tar.gz contextsync-linux-amd64
          tar -czvf contextsync-linux-arm64.tar.gz contextsync-linux-arm64
          zip contextsync-windows-amd64.zip contextsync-windows-amd64.exe

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            contextsync-darwin-*.tar.gz
            contextsync-linux-*.tar.gz
            contextsync-windows-*.zip
          generate_release_notes: true
